<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Health Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Login</h1>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="window.location.href='dashboard.html'">Login</button>
    <p id="msg"></p>

    <a href="register.html">New user? Register</a>
</div>

<script>
function login(){
    let u = user.value;
    let p = pass.value;

    let su = localStorage.getItem("username");
    let sp = localStorage.getItem("password");

    if(u===su && p===sp){
        localStorage.setItem("loggedInUser", u);
        window.location="index.html";
    }
    else{
        msg.innerText="Invalid Credentials!";
    }
}
</script>

</body>
</html>
